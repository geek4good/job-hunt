# mise managed tools
[tools]
bun = "latest"

# Environment variables
[env]
OLLAMA_MODEL = "gemma4:e4b"
OLLAMA_URL = "http://localhost:11434"
SCORE_THRESHOLD = "6"
DB_PATH = "data/jobs.db"
CV_PATH = "doc/CV-Lucas_Mbiwe.pdf"
MIN_SALARY_USD = "65000"
MIN_DAY_RATE_USD = "300"

# Tasks
[tasks.ollama]
description = "Ensure Ollama server is running and model is pulled"
run = "tasks/ollama"

[tasks.hunt]
description = "Run the job-hunt agent"
depends = ["ollama"]
run = "bun run src/main.ts"

[tasks.reset]
description = "Reset the dedup database"
run = "rm -f data/jobs.db data/jobs.db-journal && echo 'Database reset.'"
